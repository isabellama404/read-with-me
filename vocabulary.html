<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary - Read With Me</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      background: #f8f9fa;
      color: #1f2937;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ─── Top bar ────────────────────────────── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-icon { font-size: 22px; line-height: 1; }
    .topbar-title { font-size: 16px; font-weight: 700; color: #111827; }
    .topbar-count {
      font-size: 12px;
      color: #9ca3af;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 2px 8px;
    }

    .btn-clear-all {
      padding: 6px 12px;
      background: #fff;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn-clear-all:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    .btn-clear-all:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Content area ───────────────────────── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ─── Empty state ────────────────────────── */
    .empty {
      display: none;
      text-align: center;
      padding: 80px 20px;
      color: #9ca3af;
    }
    .empty.show { display: block; }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty h2 { font-size: 16px; color: #6b7280; font-weight: 600; margin-bottom: 8px; }
    .empty p  { font-size: 13px; line-height: 1.7; max-width: 320px; margin: 0 auto; }

    /* ─── Vocabulary grid ────────────────────── */
    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    /* ─── Card ───────────────────────────────── */
    .vocab-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 14px 16px;
      position: relative;
      transition: border-color 0.15s;
    }
    .vocab-card:hover { border-color: #d1d5db; }

    .card-word {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
      padding-right: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-level-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: default;
    }
    .card-synonyms {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
      line-height: 1.45;
    }
    .card-def {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 5px;
      line-height: 1.45;
    }
    .card-example {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #d1d5db;
      border-top: 1px solid #f3f4f6;
      padding-top: 8px;
      margin-top: 4px;
    }
    .card-source {
      display: flex;
      align-items: center;
      gap: 3px;
      overflow: hidden;
      min-width: 0;
    }
    .card-source-label { flex-shrink: 0; }
    .card-source a {
      color: #9ca3af;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
      display: block;
    }
    .card-source a:hover { text-decoration: underline; color: #6b7280; }
    .card-date { flex-shrink: 0; margin-left: 6px; }

    /* ─── Delete button ──────────────────────── */
    .btn-delete {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #d1d5db;
      padding: 3px 5px;
      border-radius: 4px;
      font-family: inherit;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">📚</span>
      <span class="topbar-title" id="vocab-title">Vocabulary</span>
      <span class="topbar-count" id="vocab-count">—</span>
    </div>
    <button class="btn-clear-all" id="btn-clear-all" style="display:none"></button>
  </div>

  <div class="content">
    <div class="empty" id="empty">
      <div class="empty-icon">📝</div>
      <h2 id="empty-title">Your vocabulary is empty</h2>
      <p  id="empty-desc">Click highlighted words while reading, then save them from the tooltip</p>
    </div>
    <div class="vocab-grid" id="vocab-list"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="vocabulary.js"></script>
</body>
</html>
